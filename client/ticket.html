<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Ticket | SilverVerse</title>
  <meta name="description" content="Your SilverVerse e-ticket for the Voices & Visions Festival 2026. Download as PDF or PNG.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="stylesheet" href="css/tickets.css">
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/html2canvas.min.js"></script>
  <script src="vendor/qrcode.min.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
    <symbol id="icon-printer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></symbol>
    <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
    <symbol id="icon-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></symbol>
    <symbol id="icon-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></symbol>
    <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  </svg>

  <nav class="navbar navbar-scrolled no-print">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <img src="public/silververse.png" alt="SilverVerse" width="40" height="40" style="border-radius:8px">
        SilverVerse
      </a>
      <button class="mobile-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navLinks">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li id="navAuth"></li>
      </ul>
    </div>
  </nav>

  <div class="ticket-page">
    <div class="ticket-actions no-print">
      <button onclick="window.print()" class="btn btn-primary">
        <svg style="width:16px;height:16px;"><use href="#icon-printer"/></svg> Print Ticket
      </button>
      <button onclick="downloadAsPDF()" class="btn btn-outline" id="pdfBtn">
        <svg style="width:16px;height:16px;"><use href="#icon-download"/></svg> Save as PDF
      </button>
      <button onclick="downloadAsPNG()" class="btn btn-outline" id="pngBtn">
        <svg style="width:16px;height:16px;"><use href="#icon-image"/></svg> Save as PNG
      </button>
      <button onclick="shareTicket()" class="btn btn-outline">
        <svg style="width:16px;height:16px;"><use href="#icon-share"/></svg> Share
      </button>
      <a href="receipt.html" class="btn btn-outline" id="viewReceiptLink">
        <svg style="width:16px;height:16px;"><use href="#icon-file-text"/></svg> View Receipt
      </a>
    </div>

    <div class="ticket" id="ticket">
      <div class="ticket-empty">
        <div class="empty-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <h2>Loading ticket...</h2>
        <p>Please wait while we fetch your e-ticket.</p>
      </div>
    </div>
  </div>

  <footer class="footer no-print">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 SilverVerse. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/ticket.js"></script>
</body>
</html>
