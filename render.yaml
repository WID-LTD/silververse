services:
  - type: web
    name: silververse-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/stats
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: silververse-uploads
      - key: R2_PUBLIC_URL
        value: https://pub-0bb669c8f2f1471a9a771c8d1ba527eb.r2.dev
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_CALLBACK_URL
        value: https://silververses.vercel.app/payment-success.html
      - key: FLW_WEBHOOK_SECRET
        sync: false
