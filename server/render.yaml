services:
  - type: web
    name: silververse-api
    runtime: node
    region: oregon
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── Core ──
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── CORS ──
      - key: CORS_ORIGIN
        value: https://silververses.vercel.app

      # ── Database (NeonDB) ──
      - key: DATABASE_URL
        sync: false

      # ── Session ──
      - key: SESSION_SECRET
        sync: false

      # ── Admin ──
      - key: ADMIN_PASSWORD
        sync: false

      # ── Cloudflare R2 ──
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: silververse-uploads
      - key: R2_PUBLIC_URL
        sync: false

      # ── Flutterwave ──
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_CALLBACK_URL
        value: https://silververses.vercel.app/payment-success.html
      - key: FLW_WEBHOOK_SECRET
        sync: false
