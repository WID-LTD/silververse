<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Ticket | Voices & Visions Festival 2026</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="stylesheet" href="css/tickets.css">
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
    <symbol id="icon-printer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></symbol>
    <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
    <symbol id="icon-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></symbol>
    <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  </svg>

  <nav class="navbar no-print">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon">SV</div>
        SilverVerse
      </a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="gate-checkin.html">Gate Check-in</a></li>
      </ul>
      <button class="mobile-toggle" onclick="document.querySelector('.navbar-links').classList.toggle('show')">
        <svg><use href="#icon-menu"/></svg>
      </button>
    </div>
  </nav>

  <div class="ticket-page">
    <div class="ticket-actions no-print">
      <button onclick="window.print()" class="btn btn-primary">
        <svg style="width:16px;height:16px;"><use href="#icon-printer"/></svg> Print Ticket
      </button>
      <button onclick="downloadTicket()" class="btn btn-outline">
        <svg style="width:16px;height:16px;"><use href="#icon-download"/></svg> Save as PDF
      </button>
      <button onclick="shareTicket()" class="btn btn-outline">
        <svg style="width:16px;height:16px;"><use href="#icon-share"/></svg> Share
      </button>
      <a href="receipt.html" class="btn btn-outline" id="viewReceiptLink">
        <svg style="width:16px;height:16px;"><use href="#icon-file-text"/></svg> View Receipt
      </a>
    </div>

    <div class="ticket" id="ticket">
      <!-- Filled dynamically -->
    </div>
  </div>

  <footer class="footer no-print">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 SilverVerse. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const ticketTemplates = {
      Spectator: { theme: 'ticket-theme-spectator', passType: 'SPECTATOR PASS', title: 'ADMISSION PASS', extraFields: [] },
      VIP: { theme: 'ticket-theme-vip', passType: 'VIP ADMISSION PASS', title: 'VIP PASS', extraFields: [] },
      VVIP: { theme: 'ticket-theme-vvip', passType: 'VVIP ADMISSION PASS', title: 'VVIP PASS', extraFields: [] },
      Contestant: { theme: 'ticket-theme-contestant', passType: 'CONTESTANT PASS', title: 'CONTESTANT PASS', extraFields: ['talent', 'contestNumber', 'performanceTime'] },
      Judge: { theme: 'ticket-theme-judge', passType: 'JUDGE PASS', title: 'JUDGE PASS', extraFields: ['judgeNumber'] },
      Speaker: { theme: 'ticket-theme-speaker', passType: 'SPECIAL GUEST PASS', title: 'SPEAKER PASS', extraFields: [] },
      Volunteer: { theme: 'ticket-theme-volunteer', passType: 'VOLUNTEER PASS', title: 'VOLUNTEER PASS', extraFields: ['department'] },
      Sponsor: { theme: 'ticket-theme-sponsor', passType: 'OFFICIAL SPONSOR PASS', title: 'SPONSOR PASS', extraFields: [] },
      Staff: { theme: 'ticket-theme-staff', passType: 'STAFF PASS', title: 'STAFF PASS', extraFields: [] },
      Media: { theme: 'ticket-theme-media', passType: 'MEDIA PASS', title: 'MEDIA PASS', extraFields: [] }
    };

    function getSeatNumber(category, num) {
      const prefix = { Spectator: 'S', VIP: 'VIP', VVIP: 'VVIP', Contestant: 'CT', Judge: 'JD', Speaker: 'SP', Volunteer: 'VL', Sponsor: 'SR', Staff: 'ST', Media: 'MD' };
      return (prefix[category] || 'G') + '-' + String(num).padStart(3, '0');
    }

    function renderTicket(data) {
      const tmpl = ticketTemplates[data.category] || ticketTemplates.Spectator;
      const regNum = data.regId.replace('VV26-', '');
      const seat = getSeatNumber(data.category, parseInt(regNum) || 1);

      let extraHTML = '';
      if (data.category === 'Contestant' && data.talent) {
        extraHTML = `<div class="ticket-field"><div class="field-label">Talent</div><div class="field-value">${data.talent}</div></div>
          <div class="ticket-field"><div class="field-label">Contest Number</div><div class="field-value">SG-${String(parseInt(regNum) || 1).padStart(3, '0')}</div></div>
          <div class="ticket-field"><div class="field-label">Performance Time</div><div class="field-value">${data.perfTime || 'TBA'}</div></div>`;
      } else if (data.category === 'Judge') {
        extraHTML = `<div class="ticket-field"><div class="field-label">Judge Number</div><div class="field-value">JD-${String(parseInt(regNum) || 1).padStart(2, '0')}</div></div>
          <div class="ticket-field"><div class="field-label">Access</div><div class="field-value">VIP + Backstage</div></div>`;
      } else if (data.category === 'Volunteer' && data.department) {
        extraHTML = `<div class="ticket-field"><div class="field-label">Department</div><div class="field-value">${data.department}</div></div>
          <div class="ticket-field"><div class="field-label">Access Level</div><div class="field-value">Backstage</div></div>`;
      } else if (data.category === 'Media') {
        extraHTML = `<div class="ticket-field"><div class="field-label">Access Level</div><div class="field-value">Backstage + Media Area</div></div>`;
      }

      document.getElementById('ticket').innerHTML = `
        <div class="ticket-top ${tmpl.theme}">
          <div class="pass-type">${tmpl.passType}</div>
          <h2>Voices & Visions Festival 2026</h2>
          <div class="event-name">SilverVerse Presents</div>
          <div class="accent-line"></div>
        </div>
        <div class="ticket-perf"><div class="perf-line"></div></div>
        <div class="ticket-body">
          <div class="ticket-info-grid">
            <div class="ticket-field"><div class="field-label">Registration No.</div><div class="field-value large">${data.regId}</div></div>
            <div class="ticket-field"><div class="field-label">Name</div><div class="field-value">${data.firstName} ${data.lastName}</div></div>
            <div class="ticket-field"><div class="field-label">Category</div><div class="field-value">${data.category}</div></div>
            <div class="ticket-field"><div class="field-label">Seat</div><div class="field-value">${seat}</div></div>
            <div class="ticket-field"><div class="field-label">Status</div><div class="field-value status-approved">APPROVED</div></div>
            <div class="ticket-field"><div class="field-label">Venue</div><div class="field-value">Lagos Conference Centre</div></div>
            <div class="ticket-field"><div class="field-label">Date</div><div class="field-value">15 August 2026</div></div>
            <div class="ticket-field"><div class="field-label">Time</div><div class="field-value">10:00 AM</div></div>
            ${extraHTML}
          </div>
        </div>
        <div class="ticket-qr">
          <canvas id="qrCanvas"></canvas>
          <div class="qr-label">Scan this QR code at the gate</div>
        </div>
        <div class="ticket-footer">
          <div class="powered">Powered by <strong>SilverVerse</strong></div>
          <div style="font-size:0.7rem;color:var(--gray-400);">${data.regId}</div>
        </div>`;

      QRCode.toCanvas(document.getElementById('qrCanvas'), data.regId, {
        width: 160, margin: 2,
        color: { dark: '#1f2937', light: '#ffffff' }
      });

      document.getElementById('viewReceiptLink').href = 'receipt.html?id=' + data.regId;
    }

    function loadTicket() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const data = id ? app.getData(id) : app.getLatest();

      if (!data) {
        document.getElementById('ticket').innerHTML = `
          <div class="ticket-empty">
            <div class="empty-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
            </div>
            <h2>No Registration Found</h2>
            <p>Please register first to receive your e-ticket.</p>
            <a href="register.html" class="btn btn-primary">Register Now</a>
          </div>`;
        return;
      }
      renderTicket(data);
    }

    function downloadTicket() { window.print(); }
    function shareTicket() {
      if (navigator.share) {
        navigator.share({ title: 'My SilverVerse E-Ticket', text: 'Check out my e-ticket for Voices & Visions Festival 2026!', url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => { alert('Link copied to clipboard!'); });
      }
    }

    loadTicket();
  </script>
</body>
</html>
